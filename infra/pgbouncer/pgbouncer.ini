# ═══════════════════════════════════════════════════════════════════════════
# PgBouncer Configuration — CCTV Health Monitor
# 
# Режим: transaction mode (только для prepared statements в session mode)
# Соответствие:
#   - IEC 62443-3-3 SR 4.2 (Resource Limitation)
#   - ISO 27001 A.12.6.1 (Capacity Management)
#   - СТБ 34.101.27 п. 7.3 (Управление ресурсами)
# ═══════════════════════════════════════════════════════════════════════════

[databases]
# Мастер-база (primary)
gb_telemetry = host=localhost port=5432 dbname=gb_telemetry
  pool_size=25
  max_db_connections=50
  reserve_pool=5
  reserve_timeout=3
  # Соответствует DB_MAX_CONNS=25 в настройках backend

# Реплика для чтения (read-only queries, dashboard, reports)
gb_telemetry_ro = host=localhost port=5433 dbname=gb_telemetry
  pool_size=50
  max_db_connections=100
  reserve_pool=10
  reserve_timeout=3

[pgbouncer]
# ── Сеть ────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432
# Unix socket для локального доступа backend -> pgbouncer (без TCP overhead)
unix_socket_dir = /var/run/pgbouncer
unix_socket_mode = 0770

# ── Аутентификация ──────────────────────────────────────────────────────
auth_type = scram-sha-256
# auth_file должен содержать users в формате "username" "password"
auth_file = /etc/pgbouncer/userlist.txt
# auth_user — если используется централизованная БД для хранения паролей
# auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename = $1

# ── Пул соединений (IEC 62443-3-3 SR 4.2) ───────────────────────────────
pool_mode = transaction
# Для prepared statements используем session mode для конкретных пулов
# default_pool_size — для * (wildcard) баз
default_pool_size = 25
# min_pool_size — поддерживаем минимум соединений для быстрого старта
min_pool_size = 5
# reserve_pool_size — резерв для всплесков нагрузки
reserve_pool_size = 5
reserve_pool_timeout = 3.0

# Максимальное количество клиентских соединений
max_client_conn = 200

# Максимальное количество соединений к БД на пул
max_db_connections = 50

# Таймауты (ISO 27001 A.12.6.1 — Capacity Management)
server_idle_timeout = 300        # Закрывать idle соединения через 5 минут
server_lifetime = 3600           # Максимальное время жизни соединения (1 час)
server_connect_timeout = 10      # Таймаут подключения к БД
query_timeout = 30               # Максимальное время выполнения запроса
query_wait_timeout = 10          # Максимальное время ожидания в очереди

# ── Логирование ─────────────────────────────────────────────────────────
log_connections = 1              # Логировать новые клиентские соединения
log_disconnections = 1           # Логировать закрытие соединений
log_pooler_errors = 1            # Логировать ошибки пулера
# syslog = 1
# syslog_facility = daemon
# syslog_ident = pgbouncer
stats_period = 60                # Обновление статистики каждые 60 секунд

# ── Безопасность (OWASP ASVS L3, СТБ 34.101.27) ─────────────────────────
# client_tls_sslmode — если требуется шифрование между backend и pgbouncer
# Правило 2: ЗАПРЕЩЕНО использовать иностранные криптоалгоритмы в production
# Исключение: TLS 1.3 с ГОСТ-шифросьютами для совместимости
client_tls_sslmode = disable     # В production: require с ГОСТ сертификатами
# server_tls_sslmode — шифрование между pgbouncer и PostgreSQL
server_tls_sslmode = disable     # В production: require

# ── Здоровье и мониторинг ───────────────────────────────────────────────
# SOCKS прокси и DNS
dns_max_ttl = 15.0              # Кэширование DNS
dns_zone_check_period = 0       # Отключено

# Контрольные суммы пакетов (целостность)
pkt_buf = 4096                   # Размер буфера пакетов (default 4096)
sbuf_loopcnt = 5                 # Защита от бесконечных циклов

# ── Сбор статистики ─────────────────────────────────────────────────────
# SHOW STATS, SHOW POOLS, SHOW DATABASES доступны через admin_console
admin_users = postgres
stats_users = monitor, gb_user

# ── Настройки для prepared statements ──────────────────────────────────
# Для prepared statements в transaction mode используем:
# Примечание: некоторые ORM (например, GORM) требуют session mode для prepared statements
# Если backend использует pgx с prepared statements — увеличиваем max_prepared_statements
max_prepared_statements = 100

# ── Timeout для клиентских соединений ──────────────────────────────────
client_idle_timeout = 600        # Закрывать idle клиентов через 10 минут
client_login_timeout = 60        # Таймаут аутентификации
autodb_idle_timeout = 0          # Не закрывать автоматические БД

# ── Suspend/resume — для failover (P3-DR) ──────────────────────────────
# suspend_timeout — таймаут приостановки пула для переключения на реплику
suspend_timeout = 10

# ── Защита от перегрузок (IEC 62443-3-3 SR 4.2) ────────────────────────
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3.0
