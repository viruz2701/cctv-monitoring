# ═════════════════════════════════════════════════════════════════════════════
# CCTV Health Monitor — E2E + Accessibility CI
# P1-QA.1: E2E Test Expansion (parallel, mock API isolation)
# P1-QA.3: Accessibility Testing with @axe-core/playwright
# ═════════════════════════════════════════════════════════════════════════════

name: E2E + Accessibility Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e-a11y.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e-a11y.yml'
  schedule:
    # Еженедельный прогон a11y тестов (каждый понедельник в 06:00 UTC)
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: '22'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: E2E Tests (Chromium)
  # ═══════════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests (Chromium)
        working-directory: ./frontend
        run: npm run test:e2e:ci

      - name: Upload Playwright report (E2E)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload E2E test results (PR comment)
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: dorny/test-reporter@v1
        with:
          name: E2E Test Results
          path: frontend/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Accessibility Smoke Tests (a11y) — Push/PR
  # P1-QA.3: 0 critical violations threshold
  # Быстрая проверка 5 критических страниц при каждом push/PR
  # ═══════════════════════════════════════════════════════════════════════════
  a11y-smoke:
    name: Accessibility Smoke (axe-core)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Run a11y smoke tests (5 critical pages)
        working-directory: ./frontend
        run: npm run test:a11y:smoke:ci

      - name: Upload Playwright report (a11y smoke)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-a11y-smoke
          path: frontend/playwright-report/
          retention-days: 7

      - name: Comment PR with a11y smoke results
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = '## ♿ Accessibility Smoke Check Results\n\n' +
              '**Critical pages tested:** Login, Dashboard, Work Orders, Devices, Settings\n\n' +
              '✅ All pages passed — 0 critical violations\n\n' +
              '---\n' +
              '_Threshold: 0 critical violations per page_\n' +
              '_Tool: @axe-core/playwright v4 (WCAG 2.1 AA)_\n' +
              '_Run: `npm run test:a11y:smoke:ci`_\n\n' +
              '> Full a11y scan (16 pages) runs weekly — see "E2E + Accessibility Tests (Weekly)"';

            const { data: comment } = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody,
            });

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: Full Accessibility Scan — Weekly (scheduled only)
  # Полный прогон по всем 16 страницам по расписанию
  # ═══════════════════════════════════════════════════════════════════════════
  a11y-full:
    name: Accessibility Full Scan (16 pages)
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Run full a11y scan (all pages)
        working-directory: ./frontend
        run: npm run test:a11y:ci

      - name: Upload Playwright report (a11y full)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-a11y-full
          path: frontend/playwright-report/
          retention-days: 30
