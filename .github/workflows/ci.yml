# =============================================================================
# CI Pipeline — CCTV Health Monitor
# =============================================================================
# Compliance: ISO 27001 A.12.6 (Application Security Review)
# IEC 62443-3-3 SR 7.8 (Security Function Verification)
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend (Go 1.25) ──────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cctv_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:latest
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Verify Module Path
        run: |
          cd backend
          EXPECTED="gb-telemetry-collector"
          ACTUAL=$(head -1 go.mod | awk '{print $2}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "❌ Module path mismatch: expected '$EXPECTED', got '$ACTUAL'"
            exit 1
          fi
          echo "✅ Module path: $ACTUAL"

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

      - name: Build
        run: cd backend && go build ./...

      - name: Test
        run: cd backend && go test ./... -count=1 -timeout=120s

      - name: Security Scan (gosec)
        uses: securego/gosec@master
        with:
          args: ./backend/...

  # ── Frontend (React 19 / TypeScript / Vite) ────────────────────
  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: cd frontend && npm ci

      - name: Validate OpenAPI Types
        run: cd frontend && npm run generate:api:check

      - name: Lint
        run: cd frontend && npx eslint .

      - name: Type Check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build

      - name: Test
        run: cd frontend && npx vitest run --coverage

      - name: Build Storybook
        run: cd frontend && npm run build-storybook 2>&1 | tail -5

      - name: A11y Smoke Test
        run: cd frontend && npm run test:a11y:smoke:ci

  # ── Mobile (React Native / Expo) ──────────────────────────────
  mobile:
    name: Mobile (React Native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install
        run: cd mobile && npm ci

      - name: Type Check
        run: cd mobile && npx tsc --noEmit

  # ── Security Scan (Trivy FS) ──────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
