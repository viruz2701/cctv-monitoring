      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Device details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
    put:
      tags: [Devices]
      summary: Update device
      operationId: updateDevice
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeviceRequest"
      responses:
        "200":
          description: Device updated
    delete:
      tags: [Devices]
      summary: Delete device (soft)
      operationId: deleteDevice
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
