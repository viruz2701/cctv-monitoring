  /work-orders/{id}/complete:
    post:
      tags: [WorkOrders]
      summary: Complete work order
      operationId: completeWorkOrder
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
