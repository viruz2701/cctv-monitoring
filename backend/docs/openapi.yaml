        - name: assigned_to
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Work order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      tags: [WorkOrders]
      summary: Create work order
      operationId: createWorkOrder
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
