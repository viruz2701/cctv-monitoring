  /devices/{id}/status:
    get:
      tags: [Devices]
      summary: Get device status
      operationId: getDeviceStatus
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Device status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStatus"

  # ═══════════════════════════════════════════════════════
  # Alarms
  # ═══════════════════════════════════════════════════════
  /alarms:
    get:
      tags: [Alarms]
      summary: List alarms
      operationId: listAlarms
      security: [{ BearerAuth: [] }]
      parameters:
