  # ═══════════════════════════════════════════════════════
  # Health
  # ═══════════════════════════════════════════════════════
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: healthLiveness
      responses:
        "200":
          description: Server is alive

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: healthReadiness
      responses:
        "200":
          description: Server is ready
        "503":
          description: Server not ready

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Error ─────────────────────────────────────────
    APIError:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
        trace_id: { type: string }
        timestamp: { type: string, format: date-time }

    # ── Auth ──────────────────────────────────────────
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        refresh_token: { type: string }
        user:
          $ref: "#/components/schemas/User"
        requires_2fa: { type: boolean }
        session_token: { type: string }

    TokenResponse:
      type: object
      properties:
        token: { type: string }
        refresh_token: { type: string }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, manager, technician, viewer] }
        tenant_id: { type: string }
        is_active: { type: boolean }
        totp_enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateUserRequest:
      type: object
      properties:
        username: { type: string, minLength: 3 }
        password: { type: string, minLength: 8 }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, manager, technician, viewer] }
      required: [username, password, email, role]

    UpdateUserRequest:
      type: object
      properties:
        email: { type: string, format: email }
        role: { type: string, enum: [admin, manager, technician, viewer] }
        is_active: { type: boolean }

    # ── Device ────────────────────────────────────────
    Device:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        site_id: { type: string, format: uuid }
        site_name: { type: string }
        type: { type: string, enum: [camera, nvr, dvr, switch] }
        status: { type: string, enum: [online, offline, warning] }
        health: { type: string, enum: [healthy, faulty, degraded] }
        recording_status: { type: string, enum: [recording, not_recording, scheduled] }
        ip_address: { type: string, format: ipv4 }
        model: { type: string }
        firmware: { type: string }
        last_seen: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateDeviceRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        site_id: { type: string, format: uuid }
        type: { type: string, enum: [camera, nvr, dvr, switch] }
        ip_address: { type: string, format: ipv4 }
        model: { type: string }
        firmware: { type: string }
        connection_type: { type: string, enum: [ip, p2p, snmp, syslog, alarm, gb28181, onvif] }
      required: [name, site_id, type, ip_address]

    DeviceStatus:
      type: object
      properties:
        device_id: { type: string, format: uuid }
        online: { type: boolean }
        last_seen: { type: string, format: date-time }
        ping_ms: { type: integer }
        cpu_usage: { type: number, format: float }
        memory_usage: { type: number, format: float }
        storage_usage: { type: number, format: float }
        recording_active: { type: boolean }

    # ── Alarm ─────────────────────────────────────────
    Alarm:
      type: object
      properties:
        id: { type: string, format: uuid }
        device_id: { type: string, format: uuid }
        type: { type: string }
        severity: { type: string, enum: [info, warning, critical] }
        status: { type: string, enum: [active, acknowledged, resolved] }
        message: { type: string }
        occurred_at: { type: string, format: date-time }
        acknowledged_at: { type: string, format: date-time, nullable: true }
        acknowledged_by: { type: string, nullable: true }
        resolved_at: { type: string, format: date-time, nullable: true }

    # ── Site ──────────────────────────────────────────
    Site:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        address: { type: string }
        city: { type: string }
        organization: { type: string }
        latitude: { type: number, format: float }
        longitude: { type: number, format: float }
        status: { type: string, enum: [active, inactive, maintenance] }
        last_sync: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateSiteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        address: { type: string }
        city: { type: string }
        organization: { type: string }
        latitude: { type: number, format: float }
        longitude: { type: number, format: float }
      required: [name, address, city]

    # ── Work Order ────────────────────────────────────
    WorkOrder:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [open, in_progress, completed, cancelled] }
        priority: { type: string, enum: [low, medium, high, critical] }
        device_id: { type: string, format: uuid, nullable: true }
        site_id: { type: string, format: uuid }
        assigned_to: { type: string, format: uuid, nullable: true }
        assigned_name: { type: string, nullable: true }
        sla_deadline: { type: string, format: date-time, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        resolution_notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateWorkOrderRequest:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string }
        priority: { type: string, enum: [low, medium, high, critical] }
        device_id: { type: string, format: uuid }
        site_id: { type: string, format: uuid }
        assigned_to: { type: string, format: uuid }
      required: [title, site_id]

    UpdateWorkOrderRequest:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string }
        priority: { type: string, enum: [low, medium, high, critical] }
        assigned_to: { type: string, format: uuid }
        resolution_notes: { type: string }

    PartUsage:
      type: object
      properties:
        part_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
      required: [part_id, quantity]

    TimeEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        work_order_id: { type: string, format: uuid }
        technician_id: { type: string, format: uuid }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time, nullable: true }
        duration_minutes: { type: integer }
        notes: { type: string }

    CreateTimeEntryRequest:
      type: object
      properties:
        start_time: { type: string, format: date-time }
        notes: { type: string }
      required: [start_time]

    # ── Maintenance ───────────────────────────────────
    MaintenanceSchedule:
      type: object
      properties:
        id: { type: string, format: uuid }
        device_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        type: { type: string, enum: [periodic, predictive, corrective] }
        frequency_days: { type: integer, minimum: 1 }
        last_completed: { type: string, format: date-time, nullable: true }
        next_due: { type: string, format: date-time }
        is_overdue: { type: boolean }
        created_at: { type: string, format: date-time }

    CreateScheduleRequest:
      type: object
      properties:
        device_id: { type: string, format: uuid }
        title: { type: string, maxLength: 255 }
        description: { type: string }
        type: { type: string, enum: [periodic, predictive, corrective] }
        frequency_days: { type: integer, minimum: 1 }
      required: [device_id, title, type, frequency_days]

    # ── Spare Parts ───────────────────────────────────
    SparePart:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        sku: { type: string }
        category_id: { type: string, format: uuid, nullable: true }
        category_name: { type: string, nullable: true }
        current_stock: { type: integer }
        min_stock: { type: integer }
        unit: { type: string }
        price: { type: number, format: float }
        supplier: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateSparePartRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        sku: { type: string }
        category_id: { type: string, format: uuid }
        current_stock: { type: integer, minimum: 0 }
        min_stock: { type: integer, minimum: 0 }
        unit: { type: string }
        price: { type: number, format: float, minimum: 0 }
        supplier: { type: string }
      required: [name, sku, current_stock, unit, price]

    SparePartCategory:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
