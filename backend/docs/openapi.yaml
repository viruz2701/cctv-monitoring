      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                technician_id: { type: string, format: uuid }
              required: [technician_id]
      responses:
        "200":
          description: Work order assigned

  /work-orders/{id}/start:
    post:
      tags: [WorkOrders]
      summary: Start work order
      operationId: startWorkOrder
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
