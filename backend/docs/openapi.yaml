# CCTV Health Monitor API — OpenAPI 3.1.0
# Auto-generated types: cd frontend && npm run generate:api
openapi: "3.1.0"
info:
  title: CCTV Health Monitor API
  version: "1.0.0"
  description: |
    REST API for CCTV Health Monitor — критическая информационная инфраструктура (КИИ) РБ.
    Соответствие: IEC 62443-3-3 (SL-3), ISO 27001, ISO 27019, СТБ 34.101.27, OWASP ASVS L3.
  contact:
    name: DevOps Team
    email: devops@cctv-monitor.local
servers:
  - url: /api/v1
    description: API v1

paths:
  # ═══════════════════════════════════════════════════════
  # Auth
  # ═══════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
              required: [username, password]
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          $ref: "#/components/responses/Unauthorized"

  /auth/login/2fa:
    post:
      tags: [Auth]
      summary: 2FA Login
      operationId: login2fa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_token: { type: string }
                otp: { type: string }
              required: [session_token, otp]
      responses:
        "200":
          description: 2FA verified, JWT returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT token
      operationId: refreshToken
      responses:
        "200":
          description: New JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
              required: [email]
      responses:
        "200":
          description: Reset email sent

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
              required: [token, password]
      responses:
        "200":
          description: Password reset successful

  # ═══════════════════════════════════════════════════════
  # Users
  # ═══════════════════════════════════════════════════════
  /users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me:
    get:
      tags: [Users]
      summary: Get current user
      operationId: getCurrentUser
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/password:
    put:
      tags: [Users]
      summary: Change password
      operationId: changeMyPassword
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
              required: [current_password, new_password]
      responses:
        "200":
          description: Password changed

  /users/{id}:
    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: User deleted

  # ═══════════════════════════════════════════════════════
  # Devices
  # ═══════════════════════════════════════════════════════
