# ═══════════════════════════════════════════════════════════════════════
# Production config — переопределяется через переменные окружения
# ═══════════════════════════════════════════════════════════════════════

# debug: false  # ⚠ В production ДОЛЖЕН быть false (включён через GB_DEBUG)
debug: false

# Основные настройки сервера
sip_port: 5060
sip_host: "0.0.0.0"
api_addr: ":8080"
worker_count: 100
reaper_interval: "15s"
heartbeat_timeout: "65s"
images_dir: "./data/images"


# P2P Gateway — credentials are set via environment variables:
#   GB_P2P_GATEWAY_URL, GB_P2P_API_KEY
p2p_gateway_url: "http://localhost:8082"


# HTTP-приём событий (новые протоколы)
http_xml_enabled: true      # включить эндпоинт /api/v1/external/alarm/xml
vigi_enabled: true          # включить эндпоинт /api/v1/external/alarm/vigi
save_event_images: true     # сохранять изображения из событий (base64)

# Ротация и хранение логов
log_file: "./data/logs/collector.log"
log_max_size_mb: 50
log_max_backups: 7
log_max_age_days: 30
log_compress: true

# Протокол Dahua (приватный)
dahua:
  enabled: true
  ports: [37777, 37778]

# Протокол Hisilicon
hisilicon:
  enabled: true
  port: 15002

# Протокол TVT
tvt:
  enabled: true
  port: 15003

# FTP-сервер для приёма изображений
# Credentials: GB_FTP_USER, GB_FTP_PASSWORD (env vars)
ftp:
  enabled: true
  port: 2121
  rootPath: "./data/ftp"
  allowFiles: true

# Hikvision (HTTP streaming и raw TCP) – pull-модель (исходящие соединения)
# Credentials: задаются через переменные окружения для каждой камеры
#   GB_HIKVISION_<NAME>_ADDRESS, GB_HIKVISION_<NAME>_USERNAME, GB_HIKVISION_<NAME>_PASSWORD
hikvision:
  enabled: false

# Audit log HMAC signing key (ISO 27001 A.12.4.2, СТБ 34.101.30)
# ВНИМАНИЕ: в production mode ключ ОБЯЗАТЕЛЕН (32+ байта)
# Задаётся через GB_AUDIT_HMAC_KEY (env var) или здесь.
# ═══ ВАЖНО: audit_hmac_key ОБЯЗАТЕЛЕН в production (ISO 27001 A.12.4) ═══
# Задаётся через GB_AUDIT_HMAC_KEY (env var, минимум 32 байта)
# audit_hmac_key: ""

# SNMP trap receiver
# ═══ ВАЖНО: community ДОЛЖНА быть задана через GB_SNMP_COMMUNITY ═══
# SNMP v2c с public — критическая уязвимость в production
snmp:
  enabled: false  # ⚠ Включить только при настроенной community
  port: 162
  community: ""   # ДОЛЖНА быть задана через GB_SNMP_COMMUNITY
  version: "v2c"
  # Для SNMPv3 (если version: "v3") – раскомментировать и заполнить
  # user: "monitoring"
  # authProtocol: "SHA"
  # authPassword: "your_auth_pass"
  # privProtocol: "AES"
  # privPassword: "your_priv_pass"
  # engineID: ""

# Event Store (DM-1.2.2: NATS JetStream + S3 Cold Storage)
# Валидация JSON Schema включена по умолчанию (P0-SEC.1)
event_store:
  enabled: false
  nats_url: "nats://localhost:4222"
  # nats_creds: "/path/to/creds"
  # nats_tls: false
  validation_enabled: true
  # S3/MinIO для cold storage (опционально)
  # s3_endpoint: "http://localhost:9000"
  # s3_region: "us-east-1"
  # s3_bucket: "cctv-event-store"
  # hot_retention_hours: 8760  # 1 год
  # cold_retention_hours: 43800  # 5 лет

# ═══════════════════════════════════════════════════════════════════════
# EDGE-08: WireGuard On-Demand VPN
# ═══════════════════════════════════════════════════════════════════════
# Временные VPN-туннели для удалённого доступа инженеров к edge-агентам.
#
# Compliance:
#   - IEC 62443-3-3 SL-3: Zone separation
#   - IEC 62443-3-3 SR 2.1: Authorisation enforcement
#   - Приказ ОАЦ №66 п. 7.18.2: Управление удалённым доступом
#   - ISO 27001 A.12.4: Audit trail
#
# ═══ ВАЖНО: private_key ДОЛЖЕН быть задан через GB_WIREGUARD_PRIVATE_KEY ═══
